name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend_validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        run: |
          uv sync --all-groups

      - name: Run with pytest
        run: |
          uv run pytest tests/ -v

      - name: Run ruff
        run: |
          uv run ruff check .

      - name: Run ty
        run: |
          uv run ty check
